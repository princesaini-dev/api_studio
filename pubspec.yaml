name: api_studio
description: "A powerful in-app API debugging and inspection tool for Flutter. Supports Dio interception, persistent logs, edit-and-run, CURL export, and a beautiful inspector dashboard."
version: 0.1.0
homepage: https://github.com/princesaini-dev/api_studio
repository: https://github.com/princesaini-dev/api_studio
issue_tracker: https://github.com/princesaini-dev/api_studio/issues

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5
  path_provider: ^2.1.4
  share_plus: ^10.1.4
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  bloc_test: ^9.1.7
  mocktail: ^1.0.4

flutter:
